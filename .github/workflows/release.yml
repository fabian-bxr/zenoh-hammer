name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: zenoh-hammer.exe
            asset_name: zenoh-hammer-windows-x86_64.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: zenoh-hammer
            asset_name: zenoh-hammer-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: zenoh-hammer
            asset_name: zenoh-hammer-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-randr0-dev \
            libxkbcommon-x11-dev \
            libxi-dev \
            libx11-dev \
            libxcursor-dev

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --profile release-lto --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release-lto/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/zenoh-hammer-windows-x86_64.exe/zenoh-hammer.exe artifacts/zenoh-hammer-windows-x86_64.exe/zenoh-hammer-windows-x86_64.exe
          mv artifacts/zenoh-hammer-linux-x86_64/zenoh-hammer artifacts/zenoh-hammer-linux-x86_64/zenoh-hammer-linux-x86_64
          mv artifacts/zenoh-hammer-macos-arm64/zenoh-hammer artifacts/zenoh-hammer-macos-arm64/zenoh-hammer-macos-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/zenoh-hammer-windows-x86_64.exe/zenoh-hammer-windows-x86_64.exe
            artifacts/zenoh-hammer-linux-x86_64/zenoh-hammer-linux-x86_64
            artifacts/zenoh-hammer-macos-arm64/zenoh-hammer-macos-arm64
